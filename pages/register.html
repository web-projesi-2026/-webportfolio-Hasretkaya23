<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
    <meta name="description" content="StudyUp Register"/>
    <meta name="robots" content="noindex, nofollow"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – StudyUp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="icon" type="image/png" href="../assets/img/favicon.png"/>
  <link rel="canonical" href="https://hasretkaya23.github.io/webportfolio/pages/register.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://hasretkaya23.github.io/webportfolio/pages/register.html"/>
  <meta property="og:title" content="Register – StudyUp"/>
  <meta property="og:description" content="StudyUp Register"/>
  <meta property="og:image" content="https://hasretkaya23.github.io/webportfolio/assets/img/og-cover.jpg"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Register – StudyUp"/>
  <meta name="twitter:description" content="StudyUp Register"/>
  <meta name="twitter:image" content="https://hasretkaya23.github.io/webportfolio/assets/img/og-cover.jpg"/>
  <link rel="stylesheet" href="../assets/css/responsive.css"/>
<style>
  .field-error { color:#f87171; font-size:.78rem; margin-top:4px; display:block; min-height:16px; }
  .input-error  { border-color:#f87171 !important; box-shadow:0 0 0 3px rgba(248,113,113,.15) !important; }
  .input-ok     { border-color:#34d399 !important; box-shadow:0 0 0 3px rgba(52,211,153,.15) !important; }
  .auth-submit  { transition: background .25s, color .25s, border-color .25s; }
  .auth-submit.btn-success { background:#34d399 !important; color:#000 !important; border-color:#34d399 !important; }
  .auth-submit.btn-error   { background:#f87171 !important; color:#fff !important; border-color:#f87171 !important; }
  .strength-bars { display:flex; gap:4px; margin-top:6px; }
  .strength-bar  { flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.1); transition:background .3s; }
  .strength-label{ font-size:.72rem; margin-top:3px; }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">Study<span>Up</span></a>
      <ul class="nav-links">
        <li><a href="features.html">Features</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="goals.html">Goals</a></li>
        <li><a href="motivation.html">Motivation</a></li>
        <li><a href="guide.html">Guide</a></li>
      </ul>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn-ghost" id="nav-login-btn">Log In</a>
        <a href="register.html" class="btn-solid" id="nav-signup-btn">Sign Up</a>
        <div class="user-menu" id="user-menu" style="display:none;align-items:center;gap:.75rem;">
          <span id="user-name-el" style="font-size:.85rem;color:var(--blue);font-weight:600;"></span>
          <button onclick="authLogout()" class="btn-ghost">Log Out</button>
        </div>
      </div>
      <button id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle Dark/Light Mode"><i class="fa-solid fa-moon"></i></button>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="features.html">Features</a>
    <a href="tasks.html">Tasks</a>
    <a href="goals.html">Goals</a>
    <a href="motivation.html">Motivation</a>
    <a href="guide.html">Guide</a>
    <div class="mobile-auth">
      <a href="login.html" class="btn-ghost">Log In</a>
      <a href="register.html" class="btn-solid">Sign Up</a>
    </div>
  </div>

  <!-- REGISTER CARD -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Study<span>Up</span></div>
      <div style="text-align:center">
        <span class="auth-role-badge"><i class="fa-solid fa-rocket"></i> Create a Free Account</span>
      </div>
      <h2>Join us!</h2>
      <p>Create your account and start studying right away.</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="auth-ad">First Name</label>
          <input type="text" id="auth-ad" placeholder="Your first name" autocomplete="given-name" required/>
          <span class="field-error" id="err-ad"></span>
        </div>
        <div class="form-group">
          <label for="auth-soyad">Last Name</label>
          <input type="text" id="auth-soyad" placeholder="Your last name" autocomplete="family-name" required/>
          <span class="field-error" id="err-soyad"></span>
        </div>
        <div class="form-group">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" placeholder="example@mail.com" autocomplete="email" required/>
          <span class="field-error" id="err-email"></span>
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <div style="position:relative">
            <input type="password" id="auth-password" placeholder="At least 6 characters" style="padding-right:2.8rem" autocomplete="new-password" required/>
            <button type="button" class="toggle-password" data-target="auth-password"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
          <div class="strength-bars"><div class="strength-bar" id="sb1"></div><div class="strength-bar" id="sb2"></div><div class="strength-bar" id="sb3"></div><div class="strength-bar" id="sb4"></div></div>
          <div class="strength-label" id="strength-label"></div>
          <span class="field-error" id="err-password"></span>
        <div class="form-group">
          <label for="auth-password2">Confirm Password</label>
          <div style="position:relative">
            <input type="password" id="auth-password2" placeholder="Re-enter your password" style="padding-right:2.8rem" autocomplete="new-password" required/>
            <span class="field-error" id="err-password2"></span>
            <button type="button" class="toggle-password" data-target="auth-password2"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="register-submit-btn">Sign Up <i class="fa-solid fa-rocket"></i></button>
        <p id="auth-message" style="margin-top:.75rem;font-size:.9rem;text-align:center;min-height:1.2em;"></p>
      </form>

      <div class="auth-divider">already have an account?</div>
      <p class="auth-switch"><a href="login.html">Log In →</a></p>
      <a href="../index.html" class="back-home">← Back to Home</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    /* ── Nav auth ── */
    (function(){
      var user = null;
      try { user = JSON.parse(sessionStorage.getItem('studyup_user')); } catch(e){}
      var loginBtn  = document.getElementById('nav-login-btn');
      var signupBtn = document.getElementById('nav-signup-btn');
      var userMenu  = document.getElementById('user-menu');
      var userNameEl= document.getElementById('user-name-el');
      if (user) {
        if (loginBtn)  loginBtn.style.display  = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (userMenu)  userMenu.style.display  = 'flex';
        if (userNameEl) userNameEl.textContent = user.name || user.email;
      }
    })();
    function authLogout() { sessionStorage.removeItem('studyup_user'); window.location.reload(); }

    /* ── Şifre göster/gizle ── */
    document.querySelectorAll('.toggle-password').forEach(function(btn){
      btn.addEventListener('click', function(){
        var el = document.getElementById(btn.getAttribute('data-target'));
        if (!el) return;
        el.type = (el.type === 'password') ? 'text' : 'password';
        btn.innerHTML = (el.type === 'password') ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
      });
    });

    function getUsers() { try { return JSON.parse(localStorage.getItem('studyup_users')) || []; } catch(e){ return []; } }
    function saveUsers(u) { localStorage.setItem('studyup_users', JSON.stringify(u)); }

    /* ── Yardımcılar ── */
    function setErr(id, eid, msg) {
      var el=document.getElementById(id), er=document.getElementById(eid);
      if(el){el.classList.add('input-error');el.classList.remove('input-ok');}
      if(er) er.textContent=msg;
    }
    function setOk(id, eid) {
      var el=document.getElementById(id), er=document.getElementById(eid);
      if(el){el.classList.remove('input-error');el.classList.add('input-ok');}
      if(er) er.textContent='';
    }
    function attachLive(inputId, errId, fn) {
      var el=document.getElementById(inputId); if(!el) return;
      var touched=false;
      el.addEventListener('blur', function(){ touched=true; fn(); });
      el.addEventListener('input', function(){ if(touched) fn(); });
    }

    /* ── Şifre gücü ── */
    document.getElementById('auth-password').addEventListener('input', function(){
      var v=this.value, score=0;
      if(v.length>=6) score++; if(v.length>=10) score++;
      if(/[A-Z]/.test(v)) score++; if(/[0-9!@#$%^&*]/.test(v)) score++;
      var colors=['','#f87171','#fbbf24','#34d399','#059669'];
      var labels=['','Weak','Fair','Good','Strong'];
      ['sb1','sb2','sb3','sb4'].forEach(function(id,i){
        document.getElementById(id).style.background = i<score ? colors[score] : 'rgba(255,255,255,.1)';
      });
      var lbl=document.getElementById('strength-label');
      lbl.textContent=v.length?labels[score]:''; lbl.style.color=v.length?colors[score]:'';
    });

    /* ── Validasyon fonksiyonları ── */
    function vAd()    { var v=document.getElementById('auth-ad').value.trim(); if(!v){setErr('auth-ad','err-ad','First name required.');return false;} setOk('auth-ad','err-ad');return true; }
    function vSoyad() { var v=document.getElementById('auth-soyad').value.trim(); if(!v){setErr('auth-soyad','err-soyad','Last name required.');return false;} setOk('auth-soyad','err-soyad');return true; }
    function vEmail() {
      var v=document.getElementById('auth-email').value.trim();
      var re=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!v){setErr('auth-email','err-email','Email required.');return false;}
      if(!re.test(v)){setErr('auth-email','err-email','Enter a valid email.');return false;}
      setOk('auth-email','err-email');return true;
    }
    function vPass() {
      var v=document.getElementById('auth-password').value;
      if(!v){setErr('auth-password','err-password','Password required.');return false;}
      if(v.length<6){setErr('auth-password','err-password','At least 6 characters.');return false;}
      setOk('auth-password','err-password');return true;
    }
    function vPass2() {
      var v=document.getElementById('auth-password2').value;
      var p=document.getElementById('auth-password').value;
      if(!v){setErr('auth-password2','err-password2','Please confirm password.');return false;}
      if(v!==p){setErr('auth-password2','err-password2','Passwords do not match.');return false;}
      setOk('auth-password2','err-password2');return true;
    }

    attachLive('auth-ad','err-ad',vAd);
    attachLive('auth-soyad','err-soyad',vSoyad);
    attachLive('auth-email','err-email',vEmail);
    attachLive('auth-password','err-password',vPass);
    attachLive('auth-password2','err-password2',vPass2);

    /* ── Form gönder ── */
    document.getElementById('register-form').addEventListener('submit', function(e){
      e.preventDefault();
      var ok = vAd() & vSoyad() & vEmail() & vPass() & vPass2();
      var btn=document.getElementById('register-submit-btn');
      var msgEl=document.getElementById('auth-message');

      if(!ok){
        btn.classList.add('btn-error'); btn.textContent='✗ Fix errors';
        setTimeout(function(){ btn.classList.remove('btn-error'); btn.innerHTML='Sign Up <i class="fa-solid fa-rocket"></i>'; },2000);
        return;
      }

      btn.disabled=true; btn.textContent='Please wait...';

      var ad    = document.getElementById('auth-ad').value.trim();
      var soyad = document.getElementById('auth-soyad').value.trim();
      var email = document.getElementById('auth-email').value.trim();
      var pass  = document.getElementById('auth-password').value;
      var users = getUsers();

      if(users.find(function(u){ return u.email===email; })){
        btn.classList.add('btn-error'); btn.textContent='✗ Already registered';
        msgEl.style.color='#f87171'; msgEl.textContent='This email is already registered.';
        setTimeout(function(){ btn.classList.remove('btn-error'); btn.innerHTML='Sign Up <i class="fa-solid fa-rocket"></i>'; btn.disabled=false; },2500);
        return;
      }

      setTimeout(function(){
        users.push({ name: ad+' '+soyad, email:email, password:pass });
        saveUsers(users);
        /* ✅ Başarılı → YEŞİL */
        btn.classList.add('btn-success'); btn.textContent='✓ Registered!';
        msgEl.style.color='#34d399'; msgEl.textContent='Account created! Redirecting to login...';
        setTimeout(function(){ window.location.href='login.html'; },1500);
      },700);
    });
  </script>
  <button id="scroll-top" aria-label="Scroll to top">↑</button>
</body>
</html>
