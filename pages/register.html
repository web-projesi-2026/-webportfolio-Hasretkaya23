</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">Study<span>Up</span></a>
      <ul class="nav-links">

      </ul>
      <div class="nav-auth">
        <a href="login.html" class="btn-ghost">Log In</a>
        <a href="register.html" class="btn-solid">Sign Up</a>
      </div>
      <button id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle Dark/Light Mode"><i class="fa-solid fa-moon"></i></button>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="features.html">Features</a>
    <a href="tasks.html">Tasks</a>
    <a href="goals.html">Goals</a>
    <a href="motivation.html">Motivation</a>
    <a href="guide.html">Guide</a>
    <div class="mobile-auth">
      <a href="login.html" class="btn-ghost">Log In</a>
      <a href="register.html" class="btn-solid">Sign Up</a>
    </div>
  </div>

  <!-- REGISTER CARD -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Study<span>Up</span></div>
      <div style="text-align:center">
        <span class="auth-role-badge"><i class="fa-solid fa-rocket"></i> Create a Free Account</span>
      </div>
      <h2>Join us!</h2>
      <p>Create your account and start studying right away.</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="auth-ad">First Name</label>
          <input type="text" id="auth-ad" placeholder="Your first name" autocomplete="given-name"/>
        </div>
        <div class="form-group">
          <label for="auth-soyad">Last Name</label>
          <input type="text" id="auth-soyad" placeholder="Your last name" autocomplete="family-name"/>
        </div>
        <div class="form-group">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" placeholder="example@mail.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <div style="position:relative">
            <input type="password" id="auth-password" placeholder="At least 6 characters" style="padding-right:2.8rem" autocomplete="new-password"/>
            <button type="button" class="toggle-password" data-target="auth-password"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label for="auth-password2">Confirm Password</label>
          <div style="position:relative">
            <input type="password" id="auth-password2" placeholder="Re-enter your password" style="padding-right:2.8rem" autocomplete="new-password"/>
            <button type="button" class="toggle-password" data-target="auth-password2"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="register-submit-btn">Sign Up <i class="fa-solid fa-rocket"></i></button>
        <p id="auth-message" style="margin-top:.75rem;font-size:.9rem;text-align:center;min-height:1.2em;"></p>
      </form>

      <div class="auth-divider">already have an account?</div>
      <p class="auth-switch"><a href="login.html">Log In →</a></p>
      <a href="../index.html" class="back-home">← Back to Home</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.querySelectorAll('.toggle-password').forEach(function(btn){
      btn.addEventListener('click', function(){
        var el = document.getElementById(btn.getAttribute('data-target'));
        if (!el) return;
        el.type = (el.type === 'password') ? 'text' : 'password';
        btn.textContent = (el.type === 'password') ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
      });
    });

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('studyup_users')) || []; } catch(e){ return []; }
    }
    function saveUsers(users) {
      localStorage.setItem('studyup_users', JSON.stringify(users));
    }

    document.getElementById('register-form').addEventListener('submit', function(e){
      e.preventDefault();
      var msgEl  = document.getElementById('auth-message');
      var btn    = document.getElementById('register-submit-btn');
      var ad     = document.getElementById('auth-ad').value.trim();
      var soyad  = document.getElementById('auth-soyad').value.trim();
      var email  = document.getElementById('auth-email').value.trim();
      var pass   = document.getElementById('auth-password').value;
      var pass2  = document.getElementById('auth-password2').value;

      msgEl.style.color = '#f87171';

      if (!ad || !soyad || !email || !pass || !pass2) {
        msgEl.textContent = '<i class="fa-solid fa-triangle-exclamation"></i> Please fill in all fields.'; return;
      }
      if (pass.length < 6) {
        msgEl.textContent = '<i class="fa-solid fa-triangle-exclamation"></i> Password must be at least 6 characters.'; return;
      }
      if (pass !== pass2) {
        msgEl.textContent = '<i class="fa-solid fa-triangle-exclamation"></i> Passwords do not match.'; return;
      }

      var users = getUsers();
      if (users.find(function(u){ return u.email === email; })) {
        msgEl.textContent = '<i class="fa-solid fa-triangle-exclamation"></i> This email is already registered.'; return;
      }

      btn.disabled = true;
      btn.textContent = 'Please wait...';

      setTimeout(function(){
        users.push({ name: ad + ' ' + soyad, email: email, password: pass });
        saveUsers(users);
        msgEl.style.color = '#34d399';
        msgEl.textContent = '<i class="fa-solid fa-circle-check"></i> Registration successful! Redirecting to login...';
        setTimeout(function(){ window.location.href = 'login.html'; }, 1500);
      }, 700);
    });
  </script>
  <button id="scroll-top" aria-label="Scroll to top">↑</button>
</body>
</html>
