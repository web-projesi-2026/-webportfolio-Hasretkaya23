<html lang="en">
<head>
  <meta charset="UTF-8"/>

    <meta name="robots" content="noindex, nofollow"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – StudyUp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="icon" type="image/png" href="../assets/img/favicon.png"/>
  <link rel="canonical" href="https://hasretkaya23.github.io/webportfolio/pages/login.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://hasretkaya23.github.io/webportfolio/pages/login.html"/>
  <meta property="og:title" content="Login – StudyUp"/>
  <meta property="og:description" content="StudyUp Login"/>
  <meta property="og:image" content="https://hasretkaya23.github.io/webportfolio/assets/img/og-cover.jpg"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Login – StudyUp"/>
  <meta name="twitter:description" content="StudyUp Login"/>
  <meta name="twitter:image" content="https://hasretkaya23.github.io/webportfolio/assets/img/og-cover.jpg"/>
  <link rel="stylesheet" href="../assets/css/responsive.css"/>
<style>
  .field-error { color:#f87171; font-size:.78rem; margin-top:4px; display:block; min-height:16px; }
  .input-error  { border-color:#f87171 !important; box-shadow:0 0 0 3px rgba(248,113,113,.15) !important; }
  .input-ok     { border-color:#34d399 !important; box-shadow:0 0 0 3px rgba(52,211,153,.15) !important; }
  .auth-submit  { transition: background .25s, color .25s, border-color .25s; }
  .auth-submit.btn-success { background:#34d399 !important; color:#000 !important; border-color:#34d399 !important; }
  .auth-submit.btn-error   { background:#f87171 !important; color:#fff !important; border-color:#f87171 !important; }
  .strength-bars { display:flex; gap:4px; margin-top:6px; }
  .strength-bar  { flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.1); transition:background .3s; }
  .strength-label{ font-size:.72rem; margin-top:3px; }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">Study<span>Up</span></a>
      <ul class="nav-links">
        <li><a href="features.html">Features</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="goals.html">Goals</a></li>
        <li><a href="motivation.html">Motivation</a></li>
        <li><a href="guide.html">Guide</a></li>
      </ul>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn-ghost" id="nav-login-btn">Log In</a>
        <a href="register.html" class="btn-solid" id="nav-signup-btn">Sign Up</a>
        <div class="user-menu" id="user-menu" style="display:none;align-items:center;gap:.75rem;">
          <span id="user-name-el" style="font-size:.85rem;color:var(--blue);font-weight:600;"></span>
          <button onclick="authLogout()" class="btn-ghost">Log Out</button>
        </div>
      </div>
      <button id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle Dark/Light Mode"><i class="fa-solid fa-moon"></i></button>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="features.html">Features</a>
    <a href="tasks.html">Tasks</a>
    <a href="goals.html">Goals</a>
    <a href="motivation.html">Motivation</a>
    <a href="guide.html">Guide</a>
    <div class="mobile-auth">
      <a href="login.html" class="btn-ghost">Log In</a>
      <a href="register.html" class="btn-solid">Sign Up</a>
    </div>
  </div>

  <!-- LOGIN CARD -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Study<span>Up</span></div>
      <div style="text-align:center">
        <span class="auth-role-badge"><i class="fa-solid fa-graduation-cap"></i> Student Login</span>
      </div>
      <h2>Welcome back!</h2>
      <p>Log in to your account and continue studying.</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" placeholder="example@mail.com" autocomplete="email" required/>
          <span class="field-error" id="err-email"></span>
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <div style="position:relative">
            <input type="password" id="auth-password" placeholder="Your password" style="padding-right:2.8rem" autocomplete="current-password" required/>
            <span class="field-error" id="err-password"></span>
            <button type="button" class="toggle-password" data-target="auth-password"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="login-submit-btn">Log In →</button>
        <p id="auth-message" style="margin-top:.75rem;font-size:.9rem;text-align:center;min-height:1.2em;"></p>
      </form>

      <div class="auth-divider">don't have an account?</div>
      <p class="auth-switch"><a href="register.html">Sign Up Free <i class="fa-solid fa-rocket"></i></a></p>
      <a href="../index.html" class="back-home">← Back to Home</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    /* ── Nav auth durumu ── */
    (function(){
      var user = null;
      try { user = JSON.parse(sessionStorage.getItem('studyup_user')); } catch(e){}
      if (user) { window.location.href = '../index.html'; return; }
    })();
    function authLogout() { sessionStorage.removeItem('studyup_user'); window.location.reload(); }

    /* ── Şifre göster/gizle ── */
    document.querySelectorAll('.toggle-password').forEach(function(btn){
      btn.addEventListener('click', function(){
        var el = document.getElementById(btn.getAttribute('data-target'));
        if (!el) return;
        el.type = (el.type === 'password') ? 'text' : 'password';
        btn.innerHTML = (el.type === 'password') ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
      });
    });

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('studyup_users')) || []; } catch(e){ return []; }
    }

    /* ── Yardımcılar ── */
    function setErr(inputId, errId, msg) {
      var el = document.getElementById(inputId);
      var er = document.getElementById(errId);
      if(el) { el.classList.add('input-error'); el.classList.remove('input-ok'); }
      if(er) er.textContent = msg;
    }
    function setOk(inputId, errId) {
      var el = document.getElementById(inputId);
      var er = document.getElementById(errId);
      if(el) { el.classList.remove('input-error'); el.classList.add('input-ok'); }
      if(er) er.textContent = '';
    }
    function clearState(inputId, errId) {
      var el = document.getElementById(inputId);
      var er = document.getElementById(errId);
      if(el) { el.classList.remove('input-error','input-ok'); }
      if(er) er.textContent = '';
    }

    /* ── Anlık validasyon ── */
    function attachLive(inputId, errId, validateFn) {
      var el = document.getElementById(inputId);
      if (!el) return;
      var touched = false;
      el.addEventListener('blur', function(){ touched=true; validateFn(); });
      el.addEventListener('input', function(){ if(touched) validateFn(); });
    }

    function validateEmail() {
      var v = document.getElementById('auth-email').value.trim();
      var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!v)        { setErr('auth-email','err-email','Email cannot be empty.'); return false; }
      if (!re.test(v)){ setErr('auth-email','err-email','Please enter a valid email.'); return false; }
      setOk('auth-email','err-email'); return true;
    }
    function validatePass() {
      var v = document.getElementById('auth-password').value;
      if (!v) { setErr('auth-password','err-password','Password cannot be empty.'); return false; }
      setOk('auth-password','err-password'); return true;
    }

    attachLive('auth-email',    'err-email',    validateEmail);
    attachLive('auth-password', 'err-password', validatePass);

    /* ── Form gönder ── */
    document.getElementById('login-form').addEventListener('submit', function(e){
      e.preventDefault();
      var okE = validateEmail();
      var okP = validatePass();
      var btn = document.getElementById('login-submit-btn');
      var msgEl = document.getElementById('auth-message');

      if (!okE || !okP) {
        btn.classList.add('btn-error');
        btn.textContent = '✗ Fix the errors';
        setTimeout(function(){ btn.classList.remove('btn-error'); btn.textContent = 'Log In →'; }, 2000);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Please wait...';
      msgEl.textContent = '';

      var email = document.getElementById('auth-email').value.trim();
      var pass  = document.getElementById('auth-password').value;
      var users = getUsers();
      var found = users.find(function(u){ return u.email === email && u.password === pass; });

      setTimeout(function(){
        if (found) {
          /* ✅ Başarılı → YEŞİL */
          btn.classList.add('btn-success');
          btn.textContent = '✓ Welcome!';
          msgEl.style.color = '#34d399';
          msgEl.textContent = 'Welcome back, ' + found.name + '! Redirecting...';
          sessionStorage.setItem('studyup_user', JSON.stringify({ name: found.name, email: found.email }));
          setTimeout(function(){ window.location.href = '../index.html'; }, 1200);
        } else {
          /* ❌ Hatalı → KIRMIZI */
          btn.classList.add('btn-error');
          btn.textContent = '✗ Login Failed';
          msgEl.style.color = '#f87171';
          msgEl.textContent = 'Incorrect email or password.';
          document.getElementById('auth-password').value = '';
          setErr('auth-password','err-password','');
          setTimeout(function(){
            btn.classList.remove('btn-error');
            btn.textContent = 'Log In →';
            btn.disabled = false;
          }, 2500);
        }
      }, 700);
    });
  </script>
  <button id="scroll-top" aria-label="Scroll to top">↑</button>
</body>
</html>
